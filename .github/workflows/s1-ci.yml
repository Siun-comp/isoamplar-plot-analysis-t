name: S1 CI evidence

on:
  push:
    branches-ignore:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: s1-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "1"
      E2E_BASE_URL: "http://127.0.0.1:4174/isoamplar-plot-analysis/"
      VITE_BASE_PATH: "/isoamplar-plot-analysis/"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Check committed patch formatting
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail
          if [[ -n "${BASE_SHA:-}" && ! "$BASE_SHA" =~ ^0+$ ]] && git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null; then
            git diff --check "$BASE_SHA" "$GITHUB_SHA"
          else
            git show --check --format= "$GITHUB_SHA"
          fi

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Run Vitest
        run: |
          mkdir -p evidence
          npm run test -- \
            --reporter=default \
            --reporter=junit \
            --outputFile.junit=evidence/vitest-junit.xml

      - name: Run audit evidence
        shell: bash
        run: |
          set -euo pipefail
          npm run test:audit 2>&1 \
            | tee evidence/audit-evidence.txt

      - name: Build dist once
        run: npm run build

      - name: Hash built dist
        run: npm run check:dist:before

      - name: Run fresh Chromium against built dist
        run: |
          npm run test:e2e -- \
            --project=chromium \
            --fail-on-flaky-tests \
            --reporter=github,html

      - name: Verify dist was not changed by browser tests
        if: always()
        run: |
          npm run check:dist:after
          npm run check:dist:unchanged

      - name: Upload tested dist and evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: s1-ci-${{ github.sha }}-${{ github.run_attempt }}
          path: |
            dist/
            evidence/
            playwright-report/
            test-results/
          if-no-files-found: warn
          retention-days: 14
